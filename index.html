<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChat Community - 留言墙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20, 20, 20, 0.85);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #555555;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 粒子背景 Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 60px 0 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-logo {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -2px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .header-logo span {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .header-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .header-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--text-muted), transparent);
            margin: 24px auto 0;
        }

        /* 输入区域 */
        .input-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.3s ease;
            resize: none;
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.05);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        textarea.input-field {
            min-height: 80px;
            line-height: 1.5;
        }

        .author-input {
            flex: 0 0 140px !important;
            min-width: 100px;
        }

        .char-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 6px;
            font-family: 'Space Mono', monospace;
        }

        .btn-send {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.15);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-send.loading {
            pointer-events: none;
        }

        .btn-send.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
        }

        /* 留言列表 */
        .messages-section {
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .section-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
            font-family: 'Space Mono', monospace;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 留言卡片 */
        .message-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 22px 26px;
            backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateY(20px);
            animation: cardReveal 0.5s ease-out forwards;
            transition: border-color 0.3s ease;
        }

        .message-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .message-author {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-author::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--text-primary);
            border-radius: 50%;
            opacity: 0.6;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .message-content {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            line-height: 1.7;
            word-break: break-word;
        }

        .message-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .btn-like {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.25s ease;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .btn-like:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-like.liked {
            color: var(--text-primary);
        }

        .btn-like svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .btn-like:hover svg {
            transform: scale(1.15);
        }

        .btn-like.liked svg {
            fill: currentColor;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 0.95rem;
        }

        /* 加载状态 */
        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border-color);
            border-top-color: var(--text-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 0.9rem;
            backdrop-filter: blur(20px);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px 60px;
            }

            .header {
                padding: 40px 0 36px;
            }

            .input-section {
                padding: 20px;
            }

            .input-row {
                flex-direction: column;
            }

            .author-input {
                flex: 1 !important;
            }

            .message-card {
                padding: 18px 20px;
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 主内容 -->
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1 class="header-logo"><span>i</span>Chat</h1>
            <p class="header-sub">Community Message Wall</p>
            <div class="header-divider"></div>
        </header>

        <!-- 输入区域 -->
        <section class="input-section">
            <div class="input-row">
                <textarea 
                    id="msgInput" 
                    class="input-field" 
                    placeholder="写下你的想法..."
                    maxlength="200"
                    rows="2"
                ></textarea>
            </div>
            <div class="input-row">
                <input 
                    type="text" 
                    id="authorInput" 
                    class="input-field author-input" 
                    placeholder="昵称（可选）"
                    maxlength="20"
                >
                <button id="sendBtn" class="btn-send">发送</button>
            </div>
            <div class="char-count"><span id="charCount">0</span> / 200</div>
        </section>

        <!-- 留言列表 -->
        <section class="messages-section">
            <h2 class="section-title">// Messages</h2>
            <div id="messagesList" class="messages-list">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <script>
        // =============================================
        //  Supabase 配置
        // =============================================
        const SUPABASE_URL = 'https://zispeemjnucofolfdbrn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_K_DLSwi0dkUZrhlpsOcOnQ_6o8cHVJ5';
        
        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.warn('Supabase 初始化失败:', e);
        }

        // =============================================
        //  粒子系统
        // =============================================
        class ParticleSystem {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.mouse = { x: null, y: null, radius: 120 };
                this.particleCount = window.innerWidth < 600 ? 50 : 90;
                this.connectionDistance = 150;
                this.init();
                this.bindEvents();
                this.animate();
            }

            init() {
                this.resize();
                for (let i = 0; i < this.particleCount; i++) {
                    this.particles.push(new Particle(this.canvas));
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.resize();
                    // 调整粒子数量
                    const targetCount = window.innerWidth < 600 ? 50 : 90;
                    while (this.particles.length < targetCount) {
                        this.particles.push(new Particle(this.canvas));
                    }
                    while (this.particles.length > targetCount) {
                        this.particles.pop();
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                });

                window.addEventListener('mouseout', () => {
                    this.mouse.x = null;
                    this.mouse.y = null;
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制连线
                for (let i = 0; i < this.particles.length; i++) {
                    for (let j = i + 1; j < this.particles.length; j++) {
                        const dx = this.particles[i].x - this.particles[j].x;
                        const dy = this.particles[i].y - this.particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < this.connectionDistance) {
                            const opacity = (1 - dist / this.connectionDistance) * 0.15;
                            this.ctx.beginPath();
                            this.ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            this.ctx.lineWidth = 0.5;
                            this.ctx.moveTo(this.particles[i].x, this.particles[i].y);
                            this.ctx.lineTo(this.particles[j].x, this.particles[j].y);
                            this.ctx.stroke();
                        }
                    }
                }

                // 更新和绘制粒子
                this.particles.forEach(p => {
                    p.update(this.mouse, this.canvas);
                    p.draw(this.ctx);
                });
            }
        }

        class Particle {
            constructor(canvas) {
                this.canvas = canvas;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.originalOpacity = this.opacity;
            }

            update(mouse, canvas) {
                // 鼠标交互
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        const angle = Math.atan2(dy, dx);
                        this.vx -= Math.cos(angle) * force * 0.03;
                        this.vy -= Math.sin(angle) * force * 0.03;
                        this.opacity = Math.min(1, this.originalOpacity + force * 0.5);
                    } else {
                        this.opacity += (this.originalOpacity - this.opacity) * 0.05;
                    }
                }

                // 移动
                this.x += this.vx;
                this.y += this.vy;

                // 边界反弹
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

                // 速度衰减
                this.vx *= 0.999;
                this.vy *= 0.999;

                // 最小速度
                if (Math.abs(this.vx) < 0.1) this.vx += (Math.random() - 0.5) * 0.1;
                if (Math.abs(this.vy) < 0.1) this.vy += (Math.random() - 0.5) * 0.1;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        // =============================================
        //  留言管理
        // =============================================
        const MessageManager = {
            async fetchMessages() {
                if (!supabaseClient) return [];
                
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) {
                    console.error('获取留言失败:', error);
                    return [];
                }
                return data || [];
            },

            async postMessage(content, author) {
                if (!supabaseClient) throw new Error('Supabase 未初始化');
                
                const { data, error } = await supabaseClient
                    .from('messages')
                    .insert([{ 
                        content: content.trim(), 
                        author: author.trim() || '匿名' 
                    }])
                    .select()
                    .single();

                if (error) throw error;
                return data;
            },

            async likeMessage(id, newLikes) {
                if (!supabaseClient) throw new Error('Supabase 未初始化');
                
                const { error } = await supabaseClient
                    .from('messages')
                    .update({ likes: newLikes })
                    .eq('id', id);

                if (error) throw error;
            },

            formatTime(dateStr) {
                const date = new Date(dateStr);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return '刚刚';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;
                
                return date.toLocaleDateString('zh-CN', { 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        };

        // =============================================
        //  UI 渲染
        // =============================================
        function renderMessages(messages) {
            const container = document.getElementById('messagesList');

            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">✦</div>
                        <p class="empty-text">还没有留言，成为第一个留言的人吧</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map((msg, index) => `
                <article class="message-card" style="animation-delay: ${index * 0.08}s">
                    <div class="message-header">
                        <span class="message-author">${escapeHtml(msg.author || '匿名')}</span>
                        <time class="message-time">${MessageManager.formatTime(msg.created_at)}</time>
                    </div>
                    <p class="message-content">${escapeHtml(msg.content)}</p>
                    <div class="message-footer">
                        <button class="btn-like" onclick="handleLike('${msg.id}', ${msg.likes || 0}, this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                            </svg>
                            <span>${msg.likes || 0}</span>
                        </button>
                    </div>
                </article>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // 点赞处理
        async function handleLike(id, currentLikes, btn) {
            if (btn.classList.contains('liked')) return;
            
            btn.classList.add('liked');
            const newLikes = currentLikes + 1;
            btn.querySelector('span').textContent = newLikes;

            try {
                await MessageManager.likeMessage(id, newLikes);
            } catch (e) {
                console.error('点赞失败:', e);
                btn.classList.remove('liked');
                btn.querySelector('span').textContent = currentLikes;
            }
        }

        // =============================================
        //  事件绑定与初始化
        // =============================================
        document.addEventListener('DOMContentLoaded', async () => {
            // 初始化粒子系统
            new ParticleSystem('particle-canvas');

            // 加载留言
            const messages = await MessageManager.fetchMessages();
            renderMessages(messages);

            // 字数统计
            const msgInput = document.getElementById('msgInput');
            const charCount = document.getElementById('charCount');
            
            msgInput.addEventListener('input', () => {
                charCount.textContent = msgInput.value.length;
            });

            // 发送按钮
            const sendBtn = document.getElementById('sendBtn');
            const authorInput = document.getElementById('authorInput');

            sendBtn.addEventListener('click', async () => {
                const content = msgInput.value.trim();
                if (!content) {
                    showToast('请输入留言内容');
                    return;
                }

                sendBtn.classList.add('loading');
                sendBtn.disabled = true;

                try {
                    const newMsg = await MessageManager.postMessage(content, authorInput.value);
                    
                    // 重新加载列表
                    const messages = await MessageManager.fetchMessages();
                    renderMessages(messages);

                    // 清空输入
                    msgInput.value = '';
                    authorInput.value = '';
                    charCount.textContent = '0';
                    
                    showToast('留言发布成功！');
                } catch (e) {
                    console.error('发送失败:', e);
                    showToast('发送失败，请重试');
                } finally {
                    sendBtn.classList.remove('loading');
                    sendBtn.disabled = false;
                }
            });

            // Ctrl+Enter 发送
            msgInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    sendBtn.click();
                }
            });
        });
    </script>
</body>
</html>
